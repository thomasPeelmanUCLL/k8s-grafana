name: Deploy Grafana

on:
  workflow_dispatch:
    inputs:
      chart_version:
        description: 'Chart version to deploy (leave blank for latest)'
        required: false
        default: ''

jobs:
  deploy:
    name: Helm deploy to Kubernetes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Add Grafana Helm repo
        run: |
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo update

      - name: Resolve chart version
        id: version
        run: |
          INPUT_VERSION="${{ github.event.inputs.chart_version }}"
          VALUES_VERSION=$(grep 'chartVersion:' helm/values.yaml | awk '{print $2}' | tr -d '"')

          if [ -n "$INPUT_VERSION" ]; then
            echo "version=$INPUT_VERSION" >> $GITHUB_OUTPUT
          elif [ -n "$VALUES_VERSION" ]; then
            echo "version=$VALUES_VERSION" >> $GITHUB_OUTPUT
          else
            LATEST=$(helm search repo grafana/grafana --output json | jq -r '.[0].version')
            echo "version=$LATEST" >> $GITHUB_OUTPUT
          fi

      - name: Deploy Grafana
        run: |
          helm upgrade --install grafana grafana/grafana \
            --namespace monitoring \
            --create-namespace \
            --version ${{ steps.version.outputs.version }} \
            -f helm/values.yaml \
            --wait

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/grafana -n monitoring --timeout=120s
          echo "✅ Grafana deployed successfully"
          echo "🌐 URL: $(kubectl get ingress grafana -n monitoring -o jsonpath='{.spec.rules[0].host}')"

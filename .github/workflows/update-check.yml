name: Check for Grafana chart updates

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday 08:00 UTC
  workflow_dispatch: {}

jobs:
  check-update:
    name: Compare latest chart version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Add Grafana Helm repo
        run: |
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo update

      - name: Get latest chart version
        id: latest
        run: |
          LATEST=$(helm search repo grafana/grafana --output json | jq -r '.[0].version')
          echo "version=$LATEST" >> $GITHUB_OUTPUT

      - name: Get current pinned version
        id: current
        run: |
          CURRENT=$(grep 'chartVersion:' helm/values.yaml | awk '{print $2}' | tr -d '"')
          echo "version=$CURRENT" >> $GITHUB_OUTPUT

      - name: Open PR if update available
        if: steps.latest.outputs.version != steps.current.outputs.version && steps.current.outputs.version != ''
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: bump Grafana chart to ${{ steps.latest.outputs.version }}"
          branch: "chore/bump-grafana-${{ steps.latest.outputs.version }}"
          title: "chore: bump Grafana to ${{ steps.latest.outputs.version }}"
          body: |
            ## Grafana chart update

            A new version of the Grafana Helm chart is available.

            | | Version |
            |---|---|
            | Current | `${{ steps.current.outputs.version }}` |
            | Latest  | `${{ steps.latest.outputs.version }}` |

            **Action required:** Review the [Grafana changelog](https://github.com/grafana/grafana/releases) and merge this PR to update.
          labels: dependencies,helm

      - name: Report no update needed
        if: steps.latest.outputs.version == steps.current.outputs.version || steps.current.outputs.version == ''
        run: |
          echo "✅ Grafana chart is up to date (latest: ${{ steps.latest.outputs.version }}) or version is unpinned — no PR needed."
